    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    
    <header>
        <h1 class="logo"><img src="img/header-logo.png" alt="Yumeロゴ">
        </h1>

        <nav class="nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#strengths">Strengths</a></li>

        </nav>

        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

    </header>

    <main>
        <section id="page-contact">
            <div class="wrapper">
            <h3 class="section-title">
                <span class="en">Contact</span>
                <span class="ja">お問い合わせ</span>
            </h3>
            <div class="page-contact-text">
                ご相談・お見積りは無料です。<br>初めての方でも丁寧にサポートします。
            </div>

            <form>
                <label for="name">お名前<span>必須</span></label>
                <input type="text" id="name" placeholder="（例）山田　太郎" required>

                <label for="e-mail">メールアドレス<span>必須</span></label>
                <input type="e-mail" id="e-mail" placeholder="（例）sample@example.com" required>

                <label for="type">お問い合わせ種別<span>必須</span></label>
                <div class="select-box">
                <select name="kind" id="kind">
                    <option value="option">選択してください</option>
                    <option value="request">制作依頼</option>
                    <option value="consult">ご相談</option>
                    <option value="other">その他</option>
                </select>
                </div>
                
                <label for="message">ご相談内容<span>必須</span></label>
                <textarea id="message" placeholder="どんなことでもお気軽にご相談ください" required></textarea>

                <button type="submit" class="page-contact-btn">無料で相談する</button>
            </form>

            <div class="page-contact-note">
                <p>2営業日以内に返信いたします。</p>
            </div>

            </div>
        </section>
    </main>

    <footer>
        <div class="footer-wrapper">
        <h1 class="logo"><img src="img/footer-logo.png" alt="Yumeロゴ">
        </h1>

        </div>
        <small>&COPY; 2026 Yume Portfolio</small>
    </footer>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

</body>
</html>
